# =============================================================================
# bblayers.conf — layer stack for raspi-drone
# =============================================================================
# ${TOPDIR} resolves to the build/ directory.
# All layer paths are expressed relative to it so the project is relocatable.

POKY_BBLAYERS_CONF_VERSION = "2"

BBPATH  = "${TOPDIR}"
BBFILES ?= ""

BBLAYERS ?= " \
  ${TOPDIR}/../poky/meta                            \
  ${TOPDIR}/../poky/meta-poky                       \
  ${TOPDIR}/../poky/meta-yocto-bsp                  \
  ${TOPDIR}/../meta-openembedded/meta-oe            \
  ${TOPDIR}/../meta-openembedded/meta-python        \
  ${TOPDIR}/../meta-openembedded/meta-networking    \
  ${TOPDIR}/../meta-raspberrypi                     \
  ${TOPDIR}/../meta-raspi-drone                     \
  "
