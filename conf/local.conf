# =============================================================================
# Yocto local.conf — Raspberry Pi CM5 / raspi-drone
# Yocto release: scarthgap (5.0 LTS)
# =============================================================================

# Target machine
# The CM5 uses the BCM2712 SoC (same as Pi 5).
# Requires meta-raspberrypi >= scarthgap with CM5 support.
# Fallback: set to "raspberrypi5" if raspberrypi-cm5 is not yet in your branch.
MACHINE = "raspberrypi-cm5"

# Base distribution
DISTRO = "poky"

# Use RPM as the package format
PACKAGE_CLASSES = "package_rpm"

# -----------------------------------------------------------------------------
# Parallelism — adapt to your host machine
# -----------------------------------------------------------------------------
BB_NUMBER_THREADS ?= "${@oe.utils.cpu_count()}"
PARALLEL_MAKE     ?= "-j ${@oe.utils.cpu_count()}"

# -----------------------------------------------------------------------------
# Shared download and sstate cache (outside the build dir to survive rebuilds)
# -----------------------------------------------------------------------------
DL_DIR    ?= "${TOPDIR}/../downloads"
SSTATE_DIR ?= "${TOPDIR}/../sstate-cache"

# -----------------------------------------------------------------------------
# Image output format — produces a flashable .img for SD / eMMC
# -----------------------------------------------------------------------------
IMAGE_FSTYPES = "rpi-sdimg ext4"

# -----------------------------------------------------------------------------
# Raspberry Pi hardware settings
# -----------------------------------------------------------------------------
ENABLE_UART = "1"
GPU_MEM     = "64"

# Disable splash screen for faster boot
DISABLE_SPLASH = "1"

# -----------------------------------------------------------------------------
# Image features applied globally (per-image settings live in the recipe)
# -----------------------------------------------------------------------------
EXTRA_IMAGE_FEATURES ?= "debug-tweaks"

# -----------------------------------------------------------------------------
# Misc
# -----------------------------------------------------------------------------
CONF_VERSION = "2"
