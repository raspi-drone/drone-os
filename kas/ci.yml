# kas/ci.yml
header:
  version: 14

local_conf_header:
  ci_caches: |
    SSTATE_DIR   ?= "${SSTATE_DIR}"
    DL_DIR       ?= "${DL_DIR}"
    BB_NUMBER_THREADS ?= "8"
    PARALLEL_MAKE     ?= "-j8"
    SOURCE_DATE_EPOCH = "0"

  ci_compiler_workaround: |
      CXXFLAGS:append:pn-spirv-tools-native = " -Wno-array-bounds"
      CXXFLAGS:append:pn-spirv-tools = " -Wno-array-bounds"
      OECMAKE_C_FLAGS:append:pn-spirv-tools-native = " -Wno-array-bounds"
      OECMAKE_CXX_FLAGS:append:pn-spirv-tools-native = " -Wno-array-bounds"