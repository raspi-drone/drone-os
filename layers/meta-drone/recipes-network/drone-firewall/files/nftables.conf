#!/usr/sbin/nft -f
# Managed by meta-drone (nftables bbappend). Do not edit on-device,
# this file is overwritten on every image rebuild.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        iif "lo" accept
        ct state established,related accept
        ct state invalid drop

        icmp type { echo-request, destination-unreachable, time-exceeded } accept
        icmpv6 type { echo-request, nd-neighbor-solicit, nd-neighbor-advert, destination-unreachable } accept

        # SSH only via the WireGuard tunnel
        iifname "wg0" tcp dport 22 accept

        # ROS2 / DDS (RTPS) between drone and LAN / VLAN
        iifname "wg0" ip saddr { 10.0.0.0/24, 10.0.40.0/24 } udp dport 7400-7800 accept

        # Foxglove
        iifname "wg0" tcp dport 8765 accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}